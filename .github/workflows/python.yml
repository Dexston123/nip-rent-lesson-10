name: NIP Rent

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install UV
        uses: astral-sh/setup-uv@v7
        with:
          python-version-file: ".python-version"

      - name: Install the project
        run: uv sync --dev

      - name: Run tests
        run: uv run pytest tests -v

      - name: Run linter (src)
        run: uv run ruff check src --exit-zero

      - name: Run linter (main_demo.py)
        run: uv run ruff check main_demo.py --exit-zero

      - name: Generate Docs
        run: uv run pdoc src -o docs-output

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs-output

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4